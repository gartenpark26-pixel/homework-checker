<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#845EC2"/>
    </linearGradient>
    <linearGradient id="chk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>

  <!-- 앱 배경 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- 책 왼쪽 페이지 -->
  <rect x="110" y="130" width="128" height="260" rx="14" fill="white"/>
  <!-- 책 오른쪽 페이지 (살짝 투명) -->
  <rect x="250" y="130" width="128" height="260" rx="14" fill="rgba(255,255,255,0.75)"/>
  <!-- 책 중앙 선 -->
  <rect x="242" y="130" width="14" height="260" fill="rgba(0,0,0,0.08)"/>

  <!-- 왼쪽 줄 -->
  <rect x="132" y="178" width="86" height="10" rx="5" fill="rgba(180,100,220,0.22)"/>
  <rect x="132" y="205" width="72" height="10" rx="5" fill="rgba(180,100,220,0.22)"/>
  <rect x="132" y="232" width="86" height="10" rx="5" fill="rgba(180,100,220,0.22)"/>
  <rect x="132" y="259" width="60" height="10" rx="5" fill="rgba(180,100,220,0.22)"/>
  <rect x="132" y="286" width="78" height="10" rx="5" fill="rgba(180,100,220,0.22)"/>

  <!-- 체크 뱃지 -->
  <circle cx="315" cy="280" r="58" fill="url(#chk)"/>
  <circle cx="315" cy="280" r="52" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <polyline points="288,280 308,300 342,258"
            stroke="white" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 작은 별 장식 -->
  <circle cx="420" cy="110" r="18" fill="rgba(255,255,200,0.55)"/>
  <circle cx="90"  cy="410" r="13" fill="rgba(255,255,200,0.45)"/>
  <circle cx="430" cy="420" r="10" fill="rgba(255,255,255,0.3)"/>
</svg>
